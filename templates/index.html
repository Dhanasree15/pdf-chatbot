<!DOCTYPE html>
<html>
<head>
    <title>PDF Chatbot</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
        }

        .header {
            background: black;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 60%;
            margin: auto;
            margin-top: 20px;
        }

        .chat-box {
            background: white;
            height: 450px;
            overflow-y: auto;
            padding: 15px;
            border-radius: 10px;
        }

        .user {
            text-align: right;
            color: blue;
            margin: 10px;
        }

        .bot {
            text-align: left;
            color: green;
            margin: 10px;
        }

        .score {
            font-size: 12px;
            color: gray;
        }

        .input-box {
            display: flex;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
        }

        button {
            padding: 12px;
            background: black;
            color: white;
            border: none;
        }

        .upload {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>📄 AI PDF Chatbot</h2>
</div>

<div class="container">

    <!-- Upload -->
    <form method="POST" enctype="multipart/form-data" class="upload">
        <input type="file" name="pdf">
        <button type="submit">Upload PDF</button>
    </form>

    <!-- Chat -->
    <div class="chat-box">

        {% for c in chat %}
            <div class="user">🧑 {{ c.question }}</div>

            <div class="bot">
                🤖 {{ c.answer }} <br>
                <span class="score">Confidence: {{ c.score }}</span>
            </div>

        {% endfor %}

    </div>

    <!-- Ask -->
    <form method="POST" class="input-box">
        <input type="text" name="question" placeholder="Ask question..." required>
        <button type="submit">Send</button>
    </form>

</div>

</body>
</html>
